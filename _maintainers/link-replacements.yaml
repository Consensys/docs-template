# Link Replacement Configuration
# Generic patterns that work for any network/folder without hardcoding names
# The porting tool only updates specific folders (e.g., base)
# Maintainers can manually add other folders (e.g., bitcoin) to reference/
# All links are rewritten to local paths - if content exists locally link works

# Source base path: The base path used in upstream repository that relative paths should be converted to
# This is used when converting relative paths (e.g., ../../concepts/...) to absolute paths for pattern matching
# Default: /services (if not specified)
sourceBasePath: /services

# Exact path replacements (matches the exact link path)
replacements:
  /services: https://docs.metamask.io/services
  
  # Add more exact path replacements below as needed

# Pattern-based replacements (uses regex patterns to match links)
# Patterns are applied before exact replacements
# Supports {network} placeholder in replacement (extracted from pattern match)
# Uses ([a-z0-9-]+) to match any network name (letters, numbers, hyphens)
patterns:
  # _partials pattern - matches partial imports used in JSON-RPC method files
  # Matches: /services/reference/_partials/{anything}
  # Example: /services/reference/_partials/filter-methods/_eth_call-description.mdx
  #   -> /reference/_partials/filter-methods/_eth_call-description.mdx
  - pattern: '/services/reference/_partials/.+'
    replacement: '/reference/_partials'
    extractPath: true
    description: 'Rewrite _partials import paths to local paths'
  
  # Generic JSON-RPC methods pattern - works for ANY network
  # Matches: /services/reference/{any-network}/json-rpc-methods/{anything}
  # Example: /services/reference/base/json-rpc-methods/eth_call
  #   -> /reference/base/json-rpc-methods/eth_call
  # Works for both ported (base) and manually maintained (ethereum) networks
  - pattern: '/services/reference/([a-z0-9-]+)/json-rpc-methods/.+'
    replacement: '/reference/{network}/json-rpc-methods'
    extractPath: true
    description: 'Rewrite JSON-RPC method links to local paths (works for any network)'
  
  # Generic reference links - works for ANY network
  # Matches: /services/reference/{any-network}/{anything}
  # Example: /services/reference/base/foo/bar
  #   -> /reference/base/foo/bar
  # Example: /services/reference/ethereum/some-page
  #   -> /reference/ethereum/some-page
  # If content exists locally (ported or manual), link works
  # If not, it's a broken link (maintainers can fix or add content)
  - pattern: '/services/reference/([a-z0-9-]+)/.+'
    replacement: '/reference/{network}'
    extractPath: true
    description: 'Rewrite all reference links to local paths (works for any network)'
  
  # Generic services paths (non-reference)
  # Matches: /services/{anything} that's not /services/reference/...
  # Example: /services/get-started, /services/concepts, etc.
  # Preserve as external links since these aren't ported
  - pattern: '/services/(?!reference/)(.+)'
    replacement: 'https://docs.metamask.io/services/{path}'
    extractPath: false
    description: 'Preserve full MetaMask path for general services paths (non-reference)'
  
  # Absolute paths that don't match other patterns (e.g., /developer-tools/...)
  # Matches: /{anything} that's not /services/ or /reference/ or an anchor
  # Example: /developer-tools/dashboard/get-started/create-api
  #   -> https://docs.metamask.io/developer-tools/dashboard/get-started/create-api
  # This pattern must come AFTER /services/ patterns to ensure /services/ paths are handled first
  # Note: Pattern uses negative lookahead to exclude /services/, /reference/, and anchors
  - pattern: '/(?!services/|reference/|#)(.+)'
    replacement: 'https://docs.metamask.io/{path}'
    extractPath: false
    description: 'Convert absolute paths to external MetaMask docs URLs'

# Notes:
# - ([a-z0-9-]+) matches any network name: letters, numbers, hyphens
# - {network} in replacement is replaced with the first capture group
# - {path} in replacement is replaced with the captured path
# - extractPath: true appends remaining path after pattern match
# - All /services/reference/{network}/... links are rewritten to local /reference/{network}/...
# - Works for ported content (base) and manually maintained content (ethereum, etc.)
# - New networks/folders work automatically without code changes
# - Porting tool only updates specific folders, doesn't overwrite entire reference/ folder

